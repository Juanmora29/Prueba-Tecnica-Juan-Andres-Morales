services:
  backend:
    build: .
    container_name: minecatalog-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./docs:/app/docs
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: minecatalog-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  n8n_data:
